apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: utility-ping-ingress
  namespace: default # Or whichever namespace your ping app lives in
  annotations:
    # 1. Tell Traefik to force secure entrypoints and TLS:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # 2. Tell cert-manager to handle the Let's Encrypt DNS-01 challenge:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - ping.littlehomelab.com # Your custom local domain
    secretName: utility-ping-tls-secret # Where cert-manager will save the certificate
  rules:
  - host: ping.littlehomelab.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: utility-ping-service # Match your existing service name
            port:
              number: 80 # Match your existing service port
