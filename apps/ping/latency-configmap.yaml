apiVersion: v1
kind: ConfigMap
metadata:
  name: web-probe-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cluster Latency Probe</title>
        <style>
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background-color: #0d1117;
                color: #c9d1d9;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            .card {
                background-color: #161b22;
                border: 1px solid #30363d;
                border-radius: 12px;
                padding: 30px;
                text-align: center;
                box-shadow: 0 8px 24px rgba(0,0,0,0.5);
                width: 320px;
            }
            h1 { color: #58a6ff; margin-bottom: 20px; font-size: 22px; }
            .metric { margin: 25px 0; }
            .value { font-size: 48px; font-weight: bold; color: #58a6ff; }
            .unit { font-size: 16px; color: #8b949e; }
            .stat-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                margin-top: 20px;
                border-top: 1px solid #30363d;
                padding-top: 20px;
            }
            .stat-label { font-size: 12px; color: #8b949e; text-transform: uppercase; }
            .stat-val { font-size: 18px; font-weight: 600; color: #f0f6fc; }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Cluster Latency</h1>
            <div class="metric">
                <div class="value" id="latency">--</div>
                <div class="unit">ms (RTT)</div>
            </div>
            <div class="stat-grid">
                <div>
                    <div class="stat-label">Jitter</div>
                    <div class="stat-val" id="jitter">-- ms</div>
                </div>
                <div>
                    <div class="stat-label">Requests</div>
                    <div class="stat-val" id="count">0</div>
                </div>
            </div>
        </div>

        <script>
            const latencyEl = document.getElementById('latency');
            const jitterEl = document.getElementById('jitter');
            const countEl = document.getElementById('count');

            let history = [];
            let count = 0;

            async function measureLatency() {
                const start = performance.now();
                try {
                    await fetch('/index.html', { cache: 'no-store', method: 'HEAD' });
                    const end = performance.now();
                    const rtt = Math.round(end - start);

                    count++;
                    countEl.textContent = count;
                    latencyEl.textContent = rtt;

                    if (history.length > 0) {
                        const prev = history[history.length - 1];
                        const diff = Math.abs(rtt - prev);
                        jitterEl.textContent = diff + ' ms';
                    }

                    history.push(rtt);
                    if (history.length > 10) history.shift();

                } catch (err) {
                    latencyEl.textContent = 'Err';
                    latencyEl.style.color = '#f85149';
                }
            }

            setInterval(measureLatency, 1500);
            measureLatency();
        </script>
    </body>
    </html>
