apiVersion: apps/v1
kind: Deployment
metadata:
  name: utility-ping
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: utility-ping
  template:
    metadata:
      labels:
        app: utility-ping
    spec:
      containers:
      - name: web-probe
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: web-probe-html
