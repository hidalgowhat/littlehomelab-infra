apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authelia
  namespace: default
  annotations:
    ingress.class: traefik
spec:
  rules:
    - host: auth.littlehomelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authelia
                port:
                  number: 9091
  tls:
    - hosts:
      - auth.littlehomelab.com
      secretName: authelia-tls-cert  # Ensure cert-manager creates this secret
