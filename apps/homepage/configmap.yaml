apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: "Little Homelab Operations"
    background: "https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=1600&auto=format&fit=crop&q=80"
    theme: dark
    color: slate
    locale: en-US
    layout:
      Infrastructure:
        style: row
        columns: 3
      Applications:
        style: row
        columns: 3

  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            icon: "argocd.svg"
            href: "https://argocd.littlehomelab.com"
            description: "GitOps Deployment Controller"
        - Grafana:
            icon: "grafana.svg"
            href: "https://grafana.littlehomelab.com"
            description: "Cluster Resource Metrics"
    - Applications:
        - Utility Ping:
            icon: "pingdom.svg"
            href: "https://ping.littlehomelab.com"
            description: "Network Latency Monitoring"

  bookmarks.yaml: |
    - Homelab Dev:
        - GitHub Repo:
            - icon: "github.svg"
              href: "https://github.com/hidalgowhat/littlehomelab-infra"
        - Cloudflare DNS:
            - icon: "cloudflare.svg"
              href: "https://dash.cloudflare.com"

  widgets.yaml: |
    - logo:
        icon: "https://raw.githubusercontent.com/kubernetes/kubernetes/master/logo/logo.png"
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: long
    - kubernetes:
        cluster:
          show: true

  # --- THIS IS THE CRITICAL ADDITION ---
  kubernetes.yaml: |
    mode: cluster
