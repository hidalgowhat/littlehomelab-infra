apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: "Little Homelab Operations"
    theme: dark
    color: slate
    locale: en-US

  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            href: "https://argocd.littlehomelab.com"
            description: "GitOps Deployment Controller"
        - Grafana:
            icon: "grafana.svg"
            href: "https://grafana.littlehomelab.com"
            description: "Cluster Resource Metrics"
    - Applications:
        - Utility Ping:
            icon: "pingdom.svg"
            href: "https://ping.littlehomelab.com"
            description: "Network Latency Monitoring"
    - Networking:
        - Hubble UI:
            icon: si-cilium
            href: "http://hubble.littlehomelab.com"
            description: eBPF Network Observability & Traffic Flows
            siteMonitor: http://hubble.littlehomelab.com

  bookmarks.yaml: |
    - Homelab Dev:
        - GitHub Repo:
            - icon: "github.svg"
              href: "https://github.com/hidalgowhat/littlehomelab-infra"
        - Cloudflare DNS:
            - icon: "cloudflare.svg"
              href: "https://dash.cloudflare.com"

  widgets.yaml: |
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: long

  # Placeholder kept so your deployment's subPath mount doesn't fail
  kubernetes.yaml: ""
