apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 61.3.0
    helm:
      values: |
        prometheus:
          prometheusSpec:
            # Optimized retention limits to save your USB drives:
            retention: 24h
            retentionSize: 4GiB
            resources:
              requests:
                memory: 400Mi
                cpu: 200m
              limits:
                memory: 1500Mi
                cpu: 1000m
        grafana:
          adminPassword: admin # Please change this on first login!
          resources:
            requests:
              memory: 100Mi
              cpu: 50m
            limits:
              memory: 500Mi
              cpu: 500m
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
