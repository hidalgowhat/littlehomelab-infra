apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # Installs before cilium-infra-app applies policies
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://helm.cilium.io/'
    chart: cilium
    targetRevision: 1.16.0
    helm:
      valuesObject:
        # --- Disable Standalone Envoy to bypass ARM64 TCMalloc crashes ---
        envoy:
          enabled: false
        # --- Your Active Cilium Settings ---
        k8sServiceHost: 172.69.115.201
        k8sServicePort: 6443
        kubeProxyReplacement: true
        l2announcements:
          enabled: true
        ipam:
          operator:
            clusterPoolIPv4PodCIDRList:
              - 10.42.0.0/16
        operator:
          replicas: 1

        # --- Enable Hubble ---
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
