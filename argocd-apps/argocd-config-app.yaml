apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/hidalgowhat/littlehomelab-infra.git'
    targetRevision: HEAD
    path: apps/argocd # Points to your raw files in apps/argocd
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd # Targets the argocd namespace specifically
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
