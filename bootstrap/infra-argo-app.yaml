apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-infra-configs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/hidalgowhat/littlehomelab-infra.git' # <-- Use your repo URL
    targetRevision: HEAD
    path: infrastructure/cilium-configs                                   # <-- Point to the configs folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system # Cilium configs belong in kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
